      instructions: "Condizioni e criteri per la presentazione delle proposte progettuali"
      instructions_description: "<p>Predlagatelj projektnih predlogov je lahko občanka/občan s stalnim prebivališčem v OA, ki je na dan oddaje predloga dopolnil 15 let. Predlagatelj ne sme nastopati kot izvajalec projektnega predloga. To velja za fizične osebe, lastnike pravne osebe ali člane poslovodstva pravne osebe.</p> <p>Upoštevajo se le projektni predlogi, ki ustrezajo pogojem. Pogoji za oddajo projektnih predlogov so zastavljeni tako, da dopuščajo čim več svobode in kreativnosti občanom, hkrati pa zagotavljajo, da so projektni predlogi zakoniti, izvedljivi, finančno vzdržni in zasledujejo širši javni interes.</p> <p>Projektni predlog je upravičen za uvrstitev na glasovanje, če izpolnjuje naslednje pogoje:</p> <ol> <li>Prispeva k uresničevanju javnega interesa in se izvaja na območju občine Ankaran.</li> <li>Prispeva k namenom poziva — spodbuja aktivno participacijo in vključenost občanov, dviga kakovost bivanja v lokalnem okolju, gradi skupnostni pristop in je namenjen splošni javni uporabi.</li> <li>Je takšne narave, da ga bo občina Ankaran lahko izpeljala v okviru občinskih zmogljivosti in zakonskih pristojnosti.</li> <li>Ni uvrščen v proračun oz. načrt razvojnih programov občine in ne ustreza pogojem za nepovratna finančna sredstva, ki jih predlagatelji lahko pridobijo iz javnih razpisov občine Ankaran.</li> <li>Je skladen z zakonodajo in veljavnimi občinskimi akti.</li> <li>Je načrtovan na zemljišču v javni lasti oziroma na zasebnem zemljišču s soglasjem lastnika</li> <li>V preteklih petih letih ni bil financiran/sofinanciran iz proračuna občine Ankaran.</li> <li>Je finančno ovrednoten do največ 30.000 eur z vključenim DDV-jem.</li><li>Je realno izvedljiv v proračunskem letu 2025.</li><li>Je umeščen v enega od treh območij občine, opredeljenih za participativni proračun.</li><li>Je oddan na predvidenem in v celoti izpolnjenem obrazcu (elektronsko ali fizično)</li> </ol> <h5>VSEBINA PROJEKTOV:</h5> <ul> <li>gradnja ali obnova otroških igrišč,</li> <li>gradnja ali obnova športnih površin,</li> <li>ureditve/preplastitve krajših cest, manjkajočih pločnikov</li> <li>ureditev javnih površin</li> <li>urbane ureditve (urbana oprema: klopi, koši za smeti, stojala za kolesa, javna razsvetljava,…),</li> <li>izobraževalne, turistične, kulturne vsebine,</li> <li>inovativni projekti za boljšo kakovost bivanja</li> </ul>"
      back_to_all_proposals: "Tornare all'elenco delle proposte"
