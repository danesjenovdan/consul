      main_title: "Domande frequenti"
      heading_1: "È necessario avere un numero di telefono e una connessione ad internet per partecipare?"
      description_1: "Per creare un account online sono necessari un numero di telefono, un indirizzo e-mail e una connessione a internet, ma è possibile completare tutte le funzionalità anche presso il comune."
      heading_2: "Come creare e verificare il proprio account?"
      description_2: "Per creare un account, premere il pulsante “Registrati” a fondo pagina del sito web, premendo su uno qualsiasi dei pulsanti si accede allo stesso modulo online. Per creare un account, è necessario inserire il nome utente, l'indirizzo e-mail, il CAUC, l'indirizzo permanente e la password. Una volta creato l'account, è necessario confermarlo cliccando sul collegamento contenuto nell'e-mail che verrà inviata al vostro indirizzo di posta elettronica."
      heading_3: "Come creare una nuova proposta?"
      description_3: "Oltre a presentare una proposta online, è possibile farlo anche<ul><li>In formato elettronico (scaricando il modulo ...., compilandolo e inviandolo per e-mail a ...)</li><li>I moduli stampati possono essere ritirati presso l'ufficio protocollo del Comune di Ancarano, Via Ivan Regentova 2, 6280 Ancarano durante l’orario d’ufficio.</li></ul><p>Per aiutarvi a preparare le vostre proposte progettuali, potrete partecipare ad un laboratorio pratico, che si terrà mercoledì 15 gennaio 2025 alle ore 18:00 presso il Centro ingregenerazional Ancarano, sul indirizzo Via Rudi Mahnič1, 6280 Ancarano.</p>"
      heading_4: "Password dimenticata. Come procedere?"
      description_4: "Premere il pulsante “Iscrivetevi”, quindi selezionare il collegamento “Password dimenticata”. Riceverete le istruzioni per creare una nuova password al vostro indirizzo e-mail."
      heading_5: "Kako lahko spremenim svoj e-naslov, uporabniško ime in / ali geslo?"
      description_5: "V glavi spletnega mesta klikni na gumb Moj račun, kjer lahko spremeniš vse svoje podatke."
      help_title: "Serve aiuto"
      technical_issues: "Avete problemi tecnici? "
      technical_contact: Contattate il gestore dell'app all'indirizzo <a href="mailto:consul@djnd.si" target="_blank">consul@djnd.si</a>.
      other_questions: "Avete altre domande?"
      other_contact: Contattate il Comune di Ancarano all'indirizzo <a href="mailto:sodelujem@obcina-ankaran.si" target="_blank">predlagam@obcina-ankaran.si</a>. Durante l’orario d'ufficio è a disposizione anche il numero di telefono 05 66 53 000.
    terms:
      main_title: "Condizioni d'uso e tutela della Privacy"
      date: "1. 1. 2025"
      intention: "Lo scopo di questo avviso è di aiutarvi a comprendere il funzionamento dello strumento online del bilancio partecipativo del Comune di Ancarano e l’informativa sulla privacy."
      active_use: "L’uso attivo dello strumento online viene considerato quale consenso dell’utente in merito alle presenti condizioni generali d'uso. Per partecipare attivamente è necessario essere iscritti ed aver accettato le presenti condizioni d'uso. Qualora non accettiate le presenti condizioni, siete pregati di non utilizzare il sito."
      changes: "Ci riserviamo il diritto di modificare le presenti condizioni generali d'uso in qualsiasi momento e senza preavviso pubblicando una nuova versione su questo sito web. La versione più recente delle Condizioni generali d’uso è riscontrabile dalla data dell’ultima modifica, riportata nell’intestazione delle presenti Condizioni."
      help: "In caso di dubbi, scegliete una delle opzioni di contatto riportate di seguito."
      contact1:
        mail: "info@obcina-ankaran.si"
        note1: "Telefono: durante gli orari di ufficio dell’Amministrazione comunale al numero (05) 665 30 00"
        note2: "Comune di Ancarano, Strada dell’Adriatico 66, 6280 Ancarano"
      contact2:
        mail: "consul@djnd.si"
        note1: "Assistenza tecnica:"
        note2: "Danes je nov dan, Inštitut za druga vprašanja, Resljeva cesta 25, 1000 Ljubljana"
      about_title: "Informazioni sullo strumento online"
      about_first: "Lo strumento online incentiva la partecipazione civica e consente una governance aperta, trasparente e democratica a livello comunale e nazionale. L'app è basata sulla piattaforma open-source Consul, sviluppata sotto il patrocinio del Comune di Madrid e adattata alle esigenze dei comuni sloveni dall'Istituto Danes je nov dan."
      about_second: "Lo strumento online vi permette di partecipare direttamente al processo decisionale, per stabilire di comune accordo la destinazione di una parte del bilancio comunale. Gli utenti possono presentare, sostenere, votare e monitorare lo stato di avanzamento delle proposte di progetto."
      about_third: "Possono partecipare tutte le cittadine ed i cittadini residenti ad Ancarano che abbiano compiuto 15 anni d'età (ovvero ne compiranno nel corso del 2025) e che si siano registrati allo strumento online; i genitori o i tutori sono responsabili delle attività dei minori. Ogni cittadino può presentare 3 proposte di progetto per la propria zona di residenza e, durante il periodo di votazione, ogni utente può votare 3 progetti su tutto il territorio comunale (indipendentemente dalla zona di residenza)."
      about_list:
        title: "Lo strumento consente all'utente di:"
        li1:
          title: "Presentare proposte"
          desc: "Per presentare una proposta, l'utente deve specificare il titolo della proposta di progetto e la descrizione, inoltre, può aggiungere un'immagine o la posizione della proposta e altri documenti. La proposta di progetto presentata viene automaticamente accettata e visualizzata nello strumento online. Gli utenti possono condividere la proposta sui social media, via e-mail o tramite il link accorciato."
        li2:
          title: "Votare proposte"
          desc: "Gli utenti possono votare le proposte di progetto degli altri utenti. Ogni utente può votare ogni proposta progettuale un’unica volta. Ogni utente può votare un solo progetto presentato. In fase di raccolta voti, l’utente può anche ritirare il voto espresso alla singola proposta."
        li3:
          title: "Monitorare le proposte selezionate"
          desc: "Nella fase finale, lo strumento consente di monitorare i risultati dell'implementazione."
      registration_title: "Registrazione"
      registration_intro1: "Solo gli utenti registrati possono presentare proposte di progetti e votare i progetti presentati. Gli utenti non registrati possono seguire i contenuti pubblicati, ma non possono presentare proposte di progetti o votarli."
      registration_intro2: "Registrandosi, l'utente conferma di avere 15 anni (o di compierli nel 2025) e di essere a conoscenza dei propri diritti e obblighi riportati nell'Informativa sul trattamento dei dati personali ai sensi del Regolamento generale sulla protezione dei dati e autorizza il Comune di Ancarano a verificare l'autenticità dei dati personali ai fini del progetto del Bilancio partecipativo del Comune di Ancarano da registri ufficiali e banche dati presso i titolari del trattamento dei dati personali."
      registration_requirements: "Al momento della registrazione, l'utente deve specificare:"
      name: "il nome utente,"
      email: "l’indirizzo e-mail,"
      emso: "il codice anagrafico unitario del cittadino."
      registration_first: "I dati personali conferiti dall'utente attraverso l'apposito modulo di registrazione su questa piattaforma online verranno utilizzati al solo fine di implementazione del bilancio partecipativo nel nostro comune e non saranno trasmessi a terzi, fatti salvi gli obblighi di legge."
      registration_second: "L'account dell'utente viene attivato alla conferma della e-mail di attivazione inviata all'indirizzo e-mail del richiedente. È vietato creare più account da parte dello stesso utente."
      registration_third: "L'omissione di una qualsiasi delle informazioni di cui sopra impedirà all'utente di completare con successo la registrazione e di conseguenza non potrà utilizzare lo strumento online."
      registration_fourth: "È possibile verificare, modificare o aggiornare i dati inseriti al momento della registrazione nel proprio profilo, a cui si può accedere dopo la registrazione. Nel proprio profilo è, inoltre, possibile scegliere se ricevere i messaggi al proprio indirizzo e-mail."
      registration_fifth: "Con l’uso dello strumento online, l'utente acconsente a rendervi pubblicamente visibile il nome utente e/o il nome e cognome ogniqualvolta presenta proposte e commenti."
      rules_title: "Adozione delle regole"
      rules_first: "Al momento della registrazione, l'utente deve accettare le regole di utilizzo dello strumento online."
      rules_promise: "Accettando le regole, l'utente si impegna innanzitutto a rispettare nella formulazione di proposte sia la Costituzione e sia le leggi della Repubblica di Slovenia, ciò significa in particolare, che:"
      rules_promise_first: "non pubblicherà contenuti che promuovano l’intolleranza sessuale, razziale, etnica o religiosa o qualsiasi forma di discriminazione fondata sulle circostanze personali degli individui;"
      rules_promise_second: "non pubblicherà contenuti che violino o infrangano i diritti di terzi;"
      rules_promise_third: "non pubblicherà immagini o fotografie di proprietà di terzi o che utilizzano dati di terzi senza previo consenso di proprietari e terzi;"
      rules_promise_fourth: "non userà un linguaggio minaccioso, sprezzante, osceno, umiliante o offensivo;"
      rules_promise_fifth: "non pubblicherà opere protette da copyright e non utilizzerà lo strumento per distribuire contenuti protetti da copyright o contenuti di proprietà di altre persone fisiche o giuridiche."
      rules_second: "La violazione delle regole di cui sopra comporta la sospensione temporanea o la chiusura definitiva dell'account dell'utente e/o la rimozione dei contenuti."
      responsibilities_title: "Contenuti e limitazione della responsabilità nell'utilizzo dello strumento online"
      responsibilities_first: "Ci riserviamo il diritto di modificare, aggiungere o rimuovere contenuti senza preavviso e non ci assumiamo alcuna responsabilità per le conseguenze di tali modifiche."
      responsibilities_second: "I visitatori dello strumento online utilizzano lo strumento online, le sue parti e i suoi contenuti esclusivamente a proprio rischio e pericolo. Non ci assumiamo alcuna responsabilità per l'accuratezza e la correttezza delle informazioni e dei contenuti pubblicati nello strumento online, per eventuali modifiche di informazioni o contenuti già pubblicati, o per eventuali danni subiti dai visitatori in seguito all'utilizzo delle informazioni o dei contenuti pubblicati."
      responsibilities_third: "Non ci assumiamo alcuna responsabilità per qualsiasi tipo di controversia, lite, contestazione e/o contenzioso che possa derivare dalla pubblicazione o diffusione di contenuti per i quali non sia stata ottenuta l'autorizzazione da parte dei legittimi proprietari. La responsabilità per ogni violazione dei diritti di proprietà intellettuale o industriale ricade sulla persona che ha fornito i contenuti."
      responsibilities_fourth: "Inoltre, non ci assumiamo alcuna responsabilità per eventuali danni derivanti dall’utilizzo dello strumento online e non rilasciamo alcuna garanzia in merito ai risultati dell'uso dello strumento online. Non potremo in alcun caso essere ritenuti responsabili di ogni e qualsiasi danno derivante dall'uso o dall'impossibilità di utilizzare lo strumento online, compresi i danni per mancato guadagno o perdita di profitto, perdita o svalutazione dell'avviamento, perdita di giro d’affari o dati. Non saremo responsabili nei confronti dell'utente per danni diretti, indiretti, incidentali, speciali, punitivi, consequenziali o di qualsiasi altra natura derivanti direttamente, indirettamente o in qualsiasi altro modo da errori, sbagli o imprecisioni nei contenuti dello strumento online o da qualsiasi altra circostanza relativa allo strumento stesso o al suo utilizzo."
      responsibilities_fifth: "Inoltre, non saremo responsabili nei confronti dell’utente per eventuali danni derivanti dall'accesso o dall'uso non autorizzato dei nostri server e/o di tutti i dati in essi contenuti."
      responsibilities_sixth: "Il sito contiene anche link che reindirizzano a siti web di altri soggetti. Non abbiamo alcun controllo sul funzionamento di questi siti web o sui loro contenuti e pertanto non ci assumiamo alcuna responsabilità per l'accuratezza delle informazioni e dei contenuti ivi pubblicati."
      responsibilities_list: "Inoltre, non siamo responsabili dei contenuti che"
      responsibilities_list_first: "promuovono l’intolleranza sessuale, razziale, etnica o religiosa o qualsiasi forma di discriminazione fondata sulle circostanze personali degli individui;"
      responsibilities_list_second: "infrangono o violano la privacy di terzi, sono di proprietà di terzi o utilizzano dati di terzi senza l'adeguato consenso dei proprietari e dei terzi;"
      responsibilities_list_third: "contengono minacce e offese oppure un linguaggio osceno, umiliante o offensivo;"
      responsibilities_list_fourth: "sono opere protette da copyright per le quali l'utente non detiene i diritti d'autore. La responsabilità per ogni violazione dei diritti di proprietà intellettuale o industriale ricade sulla persona che fornisce i contenuti."
      responsibilities_seventh: "Ci impegneremo a rimuovere tali contenuti dallo strumento online il prima possibile e a imporre sanzioni adeguate agli utenti in questione."
      responsibilities_eighth: "In caso di controversie tra gli utenti dello strumento online e/o terzi, siamo esonerati da qualsiasi responsabilità in caso di richieste di risarcimento danni o indennizzi di qualsiasi natura relativi ai contenuti dello strumento online e/o derivanti da procedimenti legali."
      data_protection_title: "Protezione dei dati personali"
      data_protection_first: "Titolare del trattamento dei dati personali:"
      data_protection_first_note1: "Comune di Ancarano, Strada dell’Adriatico 66, 6280 Ancarano"
      data_protection_first_note2: "No. matricola: 2482851000"
      data_protection_first_note3: "Responsabile della protezione dei dati: DATAINFO.SI d. o. o."
      data_protection_first_note4: "E-mail: info@datainfo.si"
      data_protection_first_note5: "Telefono: +386 (0) 40 733 798"
      data_protection_second: "Responsabile del trattamento in merito allo strumento online Collabora e vota!:"
      data_protection_second_note1: "Danes je nov dan, Inštitut za druga vprašanja, Resljeva cesta 25, 1000 Ljubljana"
      data_protection_second_note2: "No. matricola: 6468594000"
      data_protection_second_note3: "E-mail: vsi@danesjenovdan.si"
      data_protection_third: "Il responsabile del trattamento è contrattualmente obbligato a utilizzare i dati personali solo ed esclusivamente in nome del Comune di Ancarano ed a garantirne la loro protezione in conformità alle normative vigenti e alle nostre istruzioni."
      data_protection_fourth: "L'Istituto Danes je nov dan si impegna a proteggere i dati personali e a utilizzarli in modo trasparente, affinché gli utenti e i sostenitori possano seguire e sostenere il nostro lavoro nel modo più semplice possibile. Rispettiamo la vostra fiducia e ci impegniamo a gestire i vostri dati personali con cura e a trattarli in conformità con la normativa vigente in materia di protezione dei dati personali (GDPR e ZVOP-2). Di seguito sono descritte in modo più dettagliato le finalità e le basi del trattamento dei vostri dati personali, inclusa l’informativa sui vostri diritti. "
      data_use_title: "Base giuridica del trattamento dei dati personali"
      data_use_list: "Motivi del trattamento dei dati personali:"
      data_use_list_li1: "'interessato ha espresso il consenso al trattamento dei propri dati personali registrandosi e utilizzando lo strumento online Collabora e vota!"
      data_store_title: "Quali dati personali vengono conservati"
      data_store_list: "Vengono conservati i seguenti dati:"
      data_store_list_li1: "nome utente,"
      data_store_list_li2: "indirizzo e-mail dell'utente,"
      data_store_list_li3: "codice anagrafico unitario del cittadino."
      data_store_first: "Gli altri dati personali non verranno conservati dal titolare del trattamento."
      data_store_second: "I dati personali non vengono trasferiti a paesi terzi o organizzazioni internazionali."
      data_process_title: "Modalità di trattamento dei dati personali"
      data_process_first: "UIl titolare del trattamento conserva i dati personali dell'utente solo ai fini del corretto funzionamento dello strumento online, per poter abilitare le suddette funzionalità dello strumento e per inviare comunicazioni obbligatorie e/o convenute con l'utente (aggiornamenti, malfunzionamenti, altre attività legate al funzionamento e all'utilizzo dell'applicazione o qualsiasi altra attività legata all'applicazione)."
      data_time_title: "Tempi di conservazione dei dati personali"
      data_time_first: "I dati vengono conservati per il tempo necessario al raggiungimento delle finalità per cui sono stati acquisiti, ovvero fino a quando l'utente non cessa di utilizzare lo strumento. L'utente può interrompere l'utilizzo dello strumento online in qualsiasi momento e richiedere la cancellazione dal registro degli utenti inviando una e-mail all’indirizzo consul@djnd.si. Ricevuta la e-mail di cessazione di utilizzo dello strumento online, il titolare del trattamento provvederà a cancellare tutti i dati entro il mese successivo. Nonostante la cancellazione dei dati personali di un utente, i suggerimenti, i commenti e i dati di voto verranno conservati ma attribuiti all'utente cancellato."
      data_insight_title: "Accesso a dati e diritti degli interessati"
      data_insight_first: "Gli interessati godono di specifici diritti in relazione ai dati personali, che sono illustrati di seguito. L’interessato può richiedere l'esportazione e l'accesso ai dati personali che lo riguardano, conservati dal DJND inviando una richiesta scritta all'indirizzo consul@djnd.si. I dati personali vengono conservati in un'applicazione specifica che rispetta i requisiti di privacy e garantisce la massima sicurezza dei dati conservati attraverso varie misure fisiche, tecniche e organizzative."
      data_insight_second: "Prima di esercitare il diritto, il DJND verifica l'identità del richiedente che ha inviato la richiesta circa i propri diritti."
      data_insight_third: "Dopo aver inviato la richiesta completa e valida, DJND deve fornire idoneo riscontro al più tardi entro 1 mese dal suo ricevimento; tale termine può essere prorogato di 2 mesi, ove necessario e in caso di particolare complessità o numero ingente di richieste pervenute. In tal caso, DJND deve comunque informare l'interessato della proroga e dei motivi che l'hanno determinata. "
      data_insight_list: "Tipologie di diritti:"
      data_insight_list_li1: "diritto di accesso ai dati: su richiesta, informeremo il richiedente se sia o meno in corso un trattamento di dati personali che lo riguardano e in tal caso, gli forniremo le seguenti informazioni:"
      data_insight_list_li1_subli1: "la tipologia dei dati;"
      data_insight_list_li1_subli2: "le categorie di destinatari a cui i dati personali sono stati o saranno comunicati;"
      data_insight_list_li1_subli3: "il periodo di conservazione dei dati personali;"
      data_insight_list_li1_subli4: "l’esistenza del diritto del richiedente alla rettifica o alla cancellazione dei dati personali o alla limitazione del trattamento dei dati personali che lo riguardano o all’opposizione al loro trattamento richiesto al DJND;"
      data_insight_list_li1_subli5: "il diritto di proporre reclamo a un'autorità di controllo;"
      data_insight_list_li1_subli6: "qualora i dati non siano raccolti presso l'interessato, tutte le informazioni disponibili sulla loro origine;"
      data_insight_list_li1_subli7: "l'esistenza di un processo decisionale automatizzato, compresa la profilazione;"
      data_insight_list_li1_subli8: "su richiesta, il DJND fornisce una copia dei dati personali trattati all'interessato."
      data_insight_list_li2: "Diritto di rettifica: l'interessato ha il diritto di ottenere dal DJND la rettifica dei dati personali inesatti che lo riguardano o l'integrazione dei dati personali incompleti."
      data_insight_list_li3: "Diritto alla cancellazione (diritto all'oblio): l'interessato ha il diritto di ottenere la cancellazione dei dati personali che lo riguardano in presenza di uno dei seguenti casi:"
      data_insight_list_li3_subli1: "i dati personali non sono più necessari rispetto alle finalità per le quali sono stati raccolti o altrimenti trattati;"
      data_insight_list_li3_subli2: "l'interessato revoca il consenso su cui si basa il trattamento e se non sussiste altro fondamento giuridico per il trattamento;"
      data_insight_list_li3_subli3: "l'interessato si oppone al trattamento e non sussiste alcun motivo legittimo prevalente per procedere al trattamento."
      data_insight_list_li4: "Diritto di limitazione del trattamento: l’interessato ha il diritto di ottenere dal titolare del trattamento la limitazione del trattamento nel caso ricorresse una delle seguenti ipotesi:"
      data_insight_list_li4_subli1: "i dati non sono accurati;"
      data_insight_list_li4_subli2: "il trattamento è illecito e l’interessato si oppone alla cancellazione dei dati personali;"
      data_insight_list_li4_subli3: "benché DJND non ne abbia più bisogno ai fini del trattamento, i dati personali sono necessari all’interessato per l’accertamento, l’esercizio o la difesa di un diritto in sede giudiziaria;"
      data_insight_list_li4_subli4: "l’interessato si è opposto al trattamento."
      data_insight_list_li5: "Diritto alla portabilità dei dati: l’interessato ha il diritto di richiedere un estratto dei dati forniti a DJND qualora il trattamento si basi sul consenso o su un contratto e sia effettuato con mezzi automatizzati."
      data_insight_list_li6: "Diritto di opposizione: l’interessato ha il diritto di opporsi al trattamento dei dati personali. Tale diritto si applica solo al trattamento dei dati personali effettuato in base ad un interesse legittimo che prevale sugli interessi dell'interessato."
      data_insight_list_li7: "Diritto di proporre reclamo in merito al trattamento dei dati personali: l’interessato ha il diritto di proporre reclamo in merito al trattamento dei dati personali agli indirizzi del titolare del trattamento indicati all'articolo 1 della presente informativa."
      data_insight_fourth: "Inoltre, nel caso l’interessato ritenesse che il trattamento dei suoi dati personali violi la normativa vigente ha il diritto di proporre reclamo direttamente a un’autorità di controllo. Contatti del Garante per la protezione dei dati personali:"
      data_insight_fourth_note1: "Garante per la protezione dei dati personali, Dunajska cesta 22, 1000 Ljubljana."
      data_insight_fourth_note2: "Telefono: 01 230 97 30"
      data_insight_fourth_note3: "E_mail: gp.ip@ip-rs.si"
      cookies_title: "Cookies"
      cookies_intro: "ZLa Legge sulle comunicazioni elettroniche (Gazzetta ufficiale, n. 109/2012) ZEKom-1 ha introdotto le norme sull'uso dei cookie e di altre simili tecnologie per memorizzare o accedere alle informazioni memorizzate sui computer, tablet o dispositivi mobili degli utenti. Il nostro strumento può scaricare il cosiddetto “cookie” nel browser del vostro computer."
      cookies_what_title: "Che cosa sono i cookie?"
      cookies_what_intro: "I cookie sono piccoli file di testo che forniscono informazioni sul numero di visite del nostro sito e sui contenuti visualizzati dall'utente. I cookie non sono dannosi e la loro durata è limitata. I cookie non contengono informazioni che consentono l'identificazione personale degli utenti. Gli utenti hanno sempre la possibilità di accettare o rifiutare i cookie. La maggior parte dei browser accetta automaticamente i cookie, ma modificando le impostazioni del browser si può accettare o rifiutare i cookie o decidere di ricevere un messaggio di avviso prima di accettare un cookie dai siti web visitati."
      cookies_why_title: "A cosa servono i cookie?"
      cookies_why_intro: "Sono degli strumenti fondamentali che migliorano l'esperienza di navigazione dell'utente. I cookie rendono più semplice e veloce l'interazione tra l'utente ed il servizio web. I cookie consentono di ricordare le preferenze, gli interessi e le esperienze dell'utente, risparmiando tempo e rendendo l'uso del servizio web più efficiente e semplice."
      cookies_min_title: "Cookie strettamente necessari"
      cookies_min_intro: "Si tratta di cookie indispensabili per il corretto funzionamento dei servizi online e senza i quali non sarebbe possibile effettuare la trasmissione di una comunicazione su una rete di comunicazione elettronica. Questi cookie sono utilizzati per consentire il funzionamento dei servizi online di facile utilizzo, una migliore esperienza dell'utente e non richiedono il consenso."
      cookies_list: "Lo strumento web Consul, che alimenta Collabora e vota!, utilizza solo due cookie strettamente necessari:"
