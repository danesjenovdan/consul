    landing:
      title: Participativni proračun 2025-2026!
      introduction_text: S projektom participativnega proračuna lahko občani občine Ankaran soodločate pri razporejanju dela proračunskega denarja. Projektni predlogi, ki so po meri občanov, bodo izboljšali učinkovitost porabe skupnih sredstev, krepili participacijo v lokalnem okolju in izboljšali kakovost življenja v občini.
      title_past: Pretekli participativni proračuni
      past_list_description: Preveri izbrane projekte in spremljaj izvedbo!
      past_list_more: Več
    about:
      intro: "Il bilancio partecipativo è una procedura di partecipazione democratica in cui i cittadini decidono direttamente come spendere parte dei fondi del bilancio. Individuano autonomamente i problemi e le opportunità di miglioramento, proponendo i progetti più urgenti, la cui realizzazione contribuirebbe maggiormente a migliorare la qualità della vita della comunità. <p class="intro">Nel Comune di Ancarano, per gli esercizi finanziari 2025 e 2026, i cittadini potranno proporre e votare i progetti. I progetti hanno un valore massimo di 100.000 euro, di cui 40.000 euro per la zona del bilancio partecipativo Ancarano est, 20.000 euro per Ancarano centro e 40.000 euro per la zona del bilancio partecipativo Ancarano ovest.</p>"
      main_title: Come funziona?
      heading_1: Accoglimento delle proposte
      description_1: "I cittadini possono presentare le proposte progettuali a partire dal 27 gennaio 2025 fino al 23 febbraio 2025. Ogni proposta progettuale deve essere presentata sull'apposito modulo, avere un valore compreso tra 1.000,00 e 30.000,00 euro, IVA inclusa, e soddisfare le altre condizioni per essere inserita nel Bilancio partecipativo - da sottoporre a votazione.</p><p>Le proposte progettuali devono essere presentate tramite modulo che può essere compilato su questo sito web, scaricato qui o ritirato presso l’ufficio protocollo del Comune di Ancarano durante l’orario d’ufficio.</p><p>Il proponente deve fornire i propri dati personali richiesti nel modulo, le proposte anonime non saranno prese in considerazione. Ogni candidato può proporre un massimo di 3 proposte progettuali, per progetti relativi alla zona del bilancio partecipativo in cui risiede (le zone del bilancio partecipativo sono Ancarano est, Ancarano centro e Ancarano ovest e sono visibili sulla mappa disponibile a questo collegamento).</p><p>È possibile presentare il modulo per le proposte progettuali:<ul><li>su questo sito web, dopo essersi registrati e aver effettuato l’accesso all'applicazione online,</li><li>via posta elettronica all’indirizzo sodelujem@obcina-ankaran.si ,</li><li>di persona presso l’ufficio protocollo del Comune di Ancarano, Via Ivan Regent 2, Ancarano, durante l’orario d'ufficio.</li></ul></p>"
      date_1: 27. 1.-23. 2. 2025
      heading_2: Valutazione delle proposte
      description_2: "Tutte le proposte presentate verranno esaminate da una commissione di esperti, che valuterà ogni proposta dal punto di vista finanziario, ne verificherà la fattibilità e la conformità alle condizioni stabilite (nell'ambito delle competenze del Comune, in linea con la legislazione, con i documenti di pianificazione territoriale e di sviluppo, il contributo all'interesse pubblico, ecc.) La commissione può unire proposte progettuali identiche o simili in un'unica proposta progettuale o adattare parzialmente una singola proposta progettuale.<p>Le proposte che non soddisferanno le condizioni secondo la valutazione della commissione, verranno eliminate, tramite una motivazione che specificherà per quali condizioni non sono risultate idonee.</p><p>Tutte le proposte progettuali che soddisferanno tutte le condizioni del bando saranno sottoposte a votazione.</p>"
      date_2: 24. 2.-24. 3. 2025
      heading_3: Votazioni
      description_3: "Tra il 7 e il 20 aprile 2025, i cittadini avranno l'opportunità di votare per scegliere i progetti del Comune di Ancarano che verranno finanziati.<p>GPotranno votare i cittadini del Comune di Ancarano, che con il 1° gennaio 2025 hanno:<ul><li>residenza permanente nel Comune di Ancarano,</li><li>compiuto o compiranno 15 anni di età nel 2025 (nati nel 2010).</li></ul></p><p>Ognuno potrà votare per un massimo di 3 proposte per tutto il comune, indipendentemente dalla zona di residenza. Per ogni singola proposta progettuale è consentito votare solo una volta.</p><p>SÈ possibile inviare il proprio voto dal 7 aprile 2025 fino al 20 aprile 2025 su questo sito web, dopo essersi registrati e aver effettuato l’accesso all'applicazione online. Potrete consegnare il vostro voto online anche con l'aiuto di un assistente presso l'ufficio protocollo del Comune di Ancarano, Via Ivan Regent 2, Ancarano, durante l'orario d’ufficio:<ul><li>lunedì, 7. 4. e 14. 4. 2025 dalle 8.00 alle 12.00 </li><li>mercoledì 2. 4. e 9. 4. 2025 dalle 8.00 alle 14.00 e dalle 14.00 alle 17.00.</li><li>venerdì 4. 4. e 11. 4. 2025 dalle 8.00 alle 12.00.</li></ul></p>"
      date_3: 7. 4.-20. 4. 2025
      heading_4: Annuncio dei progetti prescelti
      description_4: "Alla conclusione delle votazioni, il comune controllerà i risultati e annuncerà i progetti selezionati. In base all'esito delle votazioni, i progetti saranno selezionati per essere inseriti nel bilancio partecipativo del Comune di Ancarano per gli anni 2025 e 2026 e per la loro attuazione per ogni zona del bilancio partecipativo del Comune di Ancarano fino all'importo totale dei fondi stanziati per ogni zona (Ancarano est totale 40.000,00 euro; Ancarano centro totale 20.000,00 euro e Ancarano ovest totale 40.000,00 euro).<p>I risultati delle votazioni saranno pubblicati sul sito web del comune dopo il 9 maggio 2025.</p>"
      date_4: "9. 5. 2025"
      heading_5: Monitoraggio dei progetti
      description_5: "I progetti vincitori in ciascuna zona di applicazione del bilancio partecipativo (Ancarano Est, Centro e Ovest) saranno inseriti nel bilancio del comune di Ancarano e realizzati nel 2025 e nel 2026. Sarà possibile seguire l'avanzamento dei progetti su questo sito web."
