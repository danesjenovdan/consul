      instructions_description: <h3>Predlagatelj:</h3>
        <ol>
          <li>mora imeti stalno prebivališče v dolinski občini in dopolniti 18 let v letu 2025 (rojen pred 15. 10. 2007);</li>
          <li>ne sme nastopati kot izvajalec predlaganega projekta, niti kot fizična oseba in niti kot lastnik ali član upravnega odbora pravne osebe, ki bi lahko izvedla projekt.</li>
        </ol>
        <h3>Značilnosti projektnega predloga:</h3>
        <ol>
          <li>mora spadati v izključno pristojnost občine; </li>
          <li>mora biti predviden za izvedbo izključno na ozemlju dolinske občine;</li>
          <li>ne sme biti v nasprotju z zakonodajo ali z občinskimi predpisi;</li>
          <li>mora biti skladen z občinsko prostorsko in razvojno dokumentacijo ter z lokalnimi razvojnimi strategijami in programi;</li>
          <li>mora prispevati k uresničevanju javnega interesa na območju občine;</li>
          <li>mora biti po vsebini tak, da ga lahko občina izvede v okviru svojih zmožnosti najkasneje v 18 mesecih od dneva razglasitve zmagovalnih projektov;</li>
          <li>mora krepiti občansko udeležbo, sodelovanje med prebivalci, izboljševati kakovost življenja v lokalnem okolju, spodbujati skupnostni pristop in biti namenjen vsem občanom, torej za javno rabo;</li>
          <li>mora imeti realno ocenjeno finančno vrednost med 3.000 in 15.000 EUR, vključno z DDV;</li>
          <li>mora biti oddan na predpisanem obrazcu, ki mora biti izpolnjen v celoti (elektronsko ali v papirni obliki).</li>
        </ol>
