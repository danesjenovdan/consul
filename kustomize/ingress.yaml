apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: consul
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - idejezanovomesto.si
        - www.idejezanovomesto.si
      secretName: consul-novo-mesto-tls
  rules:
    - host: idejezanovomesto.si
      http: &http_paths
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: consul
                port:
                  number: 3000
    - host: www.idejezanovomesto.si
      http: *http_paths

